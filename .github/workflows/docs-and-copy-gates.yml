name: Docs and Product Copy Gates

on:
  pull_request:
    paths:
      - ".github/workflows/docs-and-copy-gates.yml"
      - "README.md"
      - "get_started.md"
      - "plan.md"
      - "sdks/typescript/README.md"
      - "packages/sdk-python/README.md"
      - "web-demo/src/pages/**"
      - "web-demo/tests/**"
      - "scripts/check_primary_docs.py"
      - "scripts/check_web_demo_smoke_routes.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs-and-copy-gates.yml"
      - "README.md"
      - "get_started.md"
      - "plan.md"
      - "sdks/typescript/README.md"
      - "packages/sdk-python/README.md"
      - "web-demo/src/pages/**"
      - "web-demo/tests/**"
      - "scripts/check_primary_docs.py"
      - "scripts/check_web_demo_smoke_routes.py"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  docs-and-routes-checklist:
    name: Docs and Route Checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify primary docs stay chatbot-first
        run: python ./scripts/check_primary_docs.py
      - name: Verify smoke test route coverage for default demo path
        run: python ./scripts/check_web_demo_smoke_routes.py

  product-copy-review-gate:
    name: Product Copy Review Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Detect product-copy files
        id: paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            requires_review:
              - 'README.md'
              - 'get_started.md'
              - 'web-demo/src/pages/**'
      - name: Require product-copy-reviewed label
        if: steps.paths.outputs.requires_review == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((label) => label.name);
            if (!labels.includes('product-copy-reviewed')) {
              core.setFailed(
                "Product copy changed in README/get_started/web-demo pages. Add the 'product-copy-reviewed' label before merge."
              );
            }
