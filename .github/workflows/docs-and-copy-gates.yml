name: Docs and Product Copy Gates

on:
  pull_request:
    paths:
      - ".github/workflows/docs-and-copy-gates.yml"
      - "README.md"
      - "get_started.md"
      - "plan.md"
      - "sdks/typescript/README.md"
      - "packages/sdk-python/README.md"
      - "web-demo/src/pages/**"
      - "web-demo/tests/**"
      - "scripts/check_primary_docs.py"
      - "scripts/check_web_demo_smoke_routes.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs-and-copy-gates.yml"
      - "README.md"
      - "get_started.md"
      - "plan.md"
      - "sdks/typescript/README.md"
      - "packages/sdk-python/README.md"
      - "web-demo/src/pages/**"
      - "web-demo/tests/**"
      - "scripts/check_primary_docs.py"
      - "scripts/check_web_demo_smoke_routes.py"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  docs-and-routes-checklist:
    name: Docs and Route Checklist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify primary docs stay chatbot-first
        run: python ./scripts/check_primary_docs.py
      - name: Verify smoke test route coverage for default demo path
        run: python ./scripts/check_web_demo_smoke_routes.py

  product-copy-review-gate:
    name: Product Copy Review Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Detect product-copy files
        id: paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            requires_review:
              - 'README.md'
              - 'get_started.md'
              - 'web-demo/src/pages/**'
      - name: Require one explicit approval for product copy updates
        if: steps.paths.outputs.requires_review == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const prAuthor = context.payload.pull_request.user.login;

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const latestByReviewer = new Map();
            for (const review of reviews) {
              latestByReviewer.set(review.user.login, review.state);
            }

            const approvedReviewers = [...latestByReviewer.entries()]
              .filter(([reviewer, state]) => reviewer !== prAuthor && state === 'APPROVED')
              .map(([reviewer]) => reviewer);

            if (approvedReviewers.length === 0) {
              core.setFailed(
                'Product copy changed in README/get_started/web-demo pages. Add at least one non-author PR approval before merge.'
              );
            }
