name: SDK Artifacts

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "sdks/typescript/**"
      - "packages/sdk-python/**"
      - "schemas/**"
      - "docs/proof_bundle.schema.json"
      - "scripts/build_sdk_artifacts.py"
      - "scripts/check_release_metadata.py"
      - "scripts/generate_schemas.py"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "sdks/typescript/**"
      - "packages/sdk-python/**"
      - "schemas/**"
      - "docs/proof_bundle.schema.json"
      - "scripts/build_sdk_artifacts.py"
      - "scripts/check_release_metadata.py"
      - "scripts/generate_schemas.py"
  workflow_dispatch:

jobs:
  release-blockers:
    name: Release Blockers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install TypeScript SDK dependencies
        working-directory: sdks/typescript
        run: npm ci
      - name: Install Python SDK test/build dependencies
        run: python -m pip install --upgrade build wheel setuptools
      - name: Lint (rustfmt)
        run: cargo fmt --all --check
      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit/integration tests (Rust)
        run: cargo test --workspace
      - name: Unit/integration tests (TypeScript)
        working-directory: sdks/typescript
        run: npm test
      - name: Unit/integration tests (Python)
        working-directory: packages/sdk-python
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Schema validation
        run: python ./scripts/generate_schemas.py --check
      - name: Packaging checks (TypeScript)
        working-directory: sdks/typescript
        env:
          PROOF_SDK_NATIVE_PROFILE: release
        run: npm run pack:smoke
      - name: Packaging checks (Python)
        working-directory: packages/sdk-python
        env:
          PROOF_SDK_NATIVE_PROFILE: release
        run: python ./scripts/build_dist.py

  typescript-tarball:
    name: TypeScript Tarball (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: release-blockers
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json
      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup_openssl_windows.ps1
      - name: Install TypeScript SDK dependencies
        working-directory: sdks/typescript
        run: npm ci
      - name: Validate release metadata and schemas
        run: python ./scripts/check_release_metadata.py
      - name: Build checked npm tarball
        working-directory: sdks/typescript
        env:
          PROOF_SDK_NATIVE_PROFILE: release
        run: npm run pack:smoke
      - name: Upload TypeScript tarball
        uses: actions/upload-artifact@v6
        with:
          name: proof-layer-sdk-tarball-${{ matrix.os }}
          path: sdks/typescript/dist/artifacts/*.tgz
          if-no-files-found: error

  python-wheel:
    name: Python Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: release-blockers
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup_openssl_windows.ps1
      - name: Install wheel build dependencies
        run: python -m pip install --upgrade build wheel setuptools
      - name: Validate release metadata and schemas
        run: python ./scripts/check_release_metadata.py
      - name: Build checked Python wheel
        working-directory: packages/sdk-python
        env:
          PROOF_SDK_NATIVE_PROFILE: release
        run: python ./scripts/build_dist.py
      - name: Upload Python wheel
        uses: actions/upload-artifact@v6
        with:
          name: proof-layer-sdk-python-wheel-${{ matrix.os }}
          path: packages/sdk-python/dist/*.whl
          if-no-files-found: error
