name: Web Demo

on:
  pull_request:
    paths:
      - ".github/workflows/web-demo.yml"
      - "web-demo/**"
  push:
    paths:
      - ".github/workflows/web-demo.yml"
      - "web-demo/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-demo/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test -- --run
      - name: Build frontend
        run: npm run build
