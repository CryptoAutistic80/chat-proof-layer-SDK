services:
  proof-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PROOF_SERVICE_ADDR: 0.0.0.0:8080
      PROOF_SERVICE_STORAGE_DIR: /app/storage
      RUST_LOG: proof_service=info
      # Optional: mount and set if you want stable signing across restarts.
      # PROOF_SIGNING_KEY_PATH: /app/keys/signing.pem
      # PROOF_SIGNING_KEY_ID: kid-dev-01
    volumes:
      - ./storage:/app/storage
      - ./keys:/app/keys:ro
