services:
  proof-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PROOF_SERVICE_CONFIG_PATH: /app/vault.toml
      RUST_LOG: proof_service=info
    volumes:
      - ./storage:/app/storage
      - ./keys:/app/keys:ro
      - ./vault.toml.example:/app/vault.toml:ro
