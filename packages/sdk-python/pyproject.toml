[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "proof-layer-sdk-python"
version = "0.1.0"
description = "PoC Python SDK for Proof Layer"
readme = "README.md"
requires-python = ">=3.10"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["proofsdk*"]

[tool.setuptools.package-data]
proofsdk = ["_native*.so", "_native*.pyd", "py.typed"]
