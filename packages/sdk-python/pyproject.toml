[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "proof-layer-sdk-python"
version = "0.1.0"
description = "PoC Python SDK for Proof Layer"
requires-python = ">=3.10"
dependencies = [
  "cryptography>=42,<47",
  "rfc8785>=0.1.4,<0.2",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["proofsdk*"]
